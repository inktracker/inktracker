<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>InkTracker — Customer Quote Wizard · 25s demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
    #root { position: absolute; inset: 0; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Embedded preview: always start at t=0. Stage persists the playhead
    // to localStorage so design-tool scrubbing survives reloads, which
    // means the demo would otherwise resume mid-scene on every modal-open.
    try { localStorage.removeItem('inktracker-customer-quote-demo:t'); } catch (_) {}
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="customer-quote-scenes.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <Stage width={1920} height={1080} duration={25} background="#0B0B0E" persistKey="inktracker-customer-quote-demo">
          <CustomerQuoteDemo />
        </Stage>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
